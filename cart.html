<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - AtelierVivre</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ecf0f1;
            color: #34495e;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        .cart-container {
            margin: 20px 0;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .cart-item img {
            width: 80px;
            height: auto;
            border-radius: 5px;
            margin-right: 10px;
        }
        .remove-button {
            background-color: #c41717;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .quantity-container {
            display: flex;
            align-items: center;
        }
        .quantity-container input {
            width: 50px;
            text-align: center;
            margin-right: 10px;
        }
        .summary {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f8f8f8;
            border-radius: 5px;
        }
        .summary div {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        button {
            background-color: #34495e;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #1abc9c;
        }
        footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            background-color: #34495e;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Your Shopping Cart</h1>
</header>

<div class="cart-container" id="cart"></div>

<div class="summary">
    <h2>Order Summary</h2>
    <div>
        <span>Subtotal:</span>
        <span id="subtotal">$0.00</span>
    </div>
    <div>
        <span>Tax (5%):</span>
        <span id="tax">$0.00</span>
    </div>
    <div>
        <span>Shipping:</span>
        <span id="shipping">$5.00</span>
    </div>
    <div>
        <strong>Total:</strong>
        <strong id="total">$5.00</strong>
    </div>
</div>

<div class="buttons">
    <button onclick="goToShop()">Continue Shopping</button>
    <button onclick="placeOrder()">Place Order</button>
</div>

<footer>
    <p>&copy; 2024 AtelierVivre. All Rights Reserved.</p>
</footer>

<script>
    const products = {
        'Chic Blouse': { price: 99.99, image: 'images/img40.jpg' },
        'Elegant Pants': { price: 199.99, image: 'images/img16.jpg' },
        'Luxury Suit': { price: 249.99, image: 'images/img2.jpg' },
        'Chic Blouseee': { price: 199.99, image: 'images/img18.jpg' },
        'Elegant Burgundy Outfit': { price: 88.79, image: 'images/img4.jpg' },
        'Brown Look': { price: 99.89, image: 'images/img3.jpg' },
        'Chic Green Dress': { price: 100.00, image: 'images/imgoo.jpg' },
        'Cute Outfit in White and Pink': { price: 180.99, image: 'images/img15.jpg' },
        // أضف مزيد من المنتجات هنا
    };

    function renderCart() {
        const cartContainer = document.getElementById('cart');
        const subtotalElement = document.getElementById('subtotal');
        const taxElement = document.getElementById('tax');
        const totalElement = document.getElementById('total');
        const cartItems = JSON.parse(localStorage.getItem('cart')) || [];

        cartContainer.innerHTML = ''; // مسح المحتوى الحالي
        let subtotal = 0;

        cartItems.forEach(item => {
            const product = products[item.name]; // الحصول على تفاصيل المنتج
            const itemElement = document.createElement('div');
            itemElement.classList.add('cart-item');

            itemElement.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <img src="${product.image}" alt="${item.name}">
                    <span>${item.name}</span>
                </div>
                <div class="quantity-container">
                    <input type="number" value="${item.quantity}" min="1" onchange="updateQuantity('${item.name}', this.value)">
                    <button class="remove-button" onclick="removeFromCart('${item.name}')">Remove</button>
                </div>
                <span>$${(product.price * item.quantity).toFixed(2)}</span>
            `;
            cartContainer.appendChild(itemElement);
            subtotal += product.price * item.quantity; // حساب subtotal
        });

        subtotalElement.innerText = `$${subtotal.toFixed(2)}`;
        const tax = subtotal * 0.05; // 5% ضريبة
        taxElement.innerText = `$${tax.toFixed(2)}`;
        const shipping = 5.00; // رسوم شحن ثابتة
        const total = subtotal + tax + shipping;
        totalElement.innerText = `$${total.toFixed(2)}`;
    }

    function updateQuantity(productName, quantity) {
        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        const itemIndex = cartItems.findIndex(item => item.name === productName);
        if (itemIndex > -1) {
            cartItems[itemIndex].quantity = parseInt(quantity);
            localStorage.setItem('cart', JSON.stringify(cartItems)); // تحديث السلة
            renderCart(); // إعادة عرض السلة
        }
    }

    function removeFromCart(productName) {
        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        cartItems = cartItems.filter(item => item.name !== productName); // إزالة المنتج
        localStorage.setItem('cart', JSON.stringify(cartItems)); // تحديث السلة
        renderCart(); // إعادة عرض السلة
    }

    function goToShop() {
        window.location.href = 'shop.html'; // استبدل برابط صفحة المتجر
    }

    function placeOrder() {
        alert('Order placed successfully!');
        localStorage.removeItem('cart'); // مسح السلة بعد الطلب
        renderCart(); // إعادة عرض السلة
    }

    // استدعاء renderCart عند تحميل الصفحة
    renderCart();
</script>

</body>
</html>
