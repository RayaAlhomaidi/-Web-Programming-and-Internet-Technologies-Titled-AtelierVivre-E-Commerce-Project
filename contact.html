<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtelierVivre - Contact</title>
    <style>
        /* Basic styles for the page */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .brand-logo a {
            text-decoration: none;
            color: white;
            font-size: 30px;
            font-weight: bold;
        }

        /* Contact Section */
        .contact-section {
            background-color: #fff;
            padding: 50px;
            text-align: center;
        }

        .contact-section h2 {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .contact-info p {
            font-size: 18px;
            color: #555;
            margin: 10px 0;
        }

        /* Social Media Links */
        .social-media {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-media a {
            text-decoration: none;
            font-size: 30px;
            color: #2c3e50;
            transition: color 0.3s ease;
        }

        .social-media a:hover {
            color: #e74c3c;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

    </style>

    <!-- Font Awesome CSS for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="brand-logo">
            <a href="index.html">AtelierVivre</a>
        </div>
    </header>

    <div class="contact-section">
        <h2>Contact Us</h2>
        <div class="contact-info">
            <p>If you have any questions or inquiries, feel free to reach out to us. We are always here to help!</p>
            <p>Email: <a href="mailto:contact@ateliervivre.com">contact@ateliervivre.com</a></p>
            <p>Phone: +123-456-7890</p>
        </div>

        <div class="social-media">
            <!-- Facebook Icon -->
            <a href="https://www.facebook.com" target="_blank">
                <i class="fab fa-facebook-square"></i>
            </a>
            <!-- Instagram Icon -->
            <a href="https://www.instagram.com" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <!-- Twitter Icon -->
            <a href="https://www.twitter.com" target="_blank">
                <i class="fab fa-twitter"></i>
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 AtelierVivre. All Rights Reserved.</p>
    </footer>

</body>
</html>
